# /etc/nginx/sites-available/merrolyn  (on the web CT)
# Host-split two environments off one container:
#   DEV  = merrolyn.moorelab.cloud  -> /var/www/merrolyn-dev   (noindex)
#   PROD = merrolyn.com (+ www)     -> /var/www/merrolyn-prod
# Both reverse-proxy /api/* and /sms-webhook to the Fastify service on :3000.
# HAProxy terminates TLS and routes both hostnames here; nginx splits by Host.

server {
    listen 80;
    server_name merrolyn.moorelab.cloud;            # DEV / staging
    root /var/www/merrolyn-dev;
    index index.html;
    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Robots-Tag "noindex, nofollow" always;   # keep dev out of search
    location / { try_files $uri $uri/ =404; }
    location ~ ^/(api/|sms-webhook) {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~* \.(css|js|svg|jpg|jpeg|png|woff2?)$ { expires 7d; add_header Cache-Control public; }
}

server {
    listen 80 default_server;
    server_name merrolyn.com www.merrolyn.com _;     # PROD
    root /var/www/merrolyn-prod;
    index index.html;
    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    location / { try_files $uri $uri/ =404; }
    location ~ ^/(api/|sms-webhook) {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~* \.(css|js|svg|jpg|jpeg|png|woff2?)$ { expires 7d; add_header Cache-Control public; }
}
