# /etc/nginx/conf.d/carolyn-merrick.conf  (on the Web CT)
# Static 11ty output. HAProxy does host/TLS; this just serves files.
server {
    listen 80 default_server;
    server_name _;

    root /var/www/carolyn-merrick;
    index index.html;

    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # pretty URLs (11ty writes /page/index.html)
    location / {
        try_files $uri $uri/ =404;
    }

    # long-cache fingerprinted-ish assets; html stays fresh
    location ~* \.(css|js|svg|woff2?|png|jpg|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    access_log /var/log/nginx/carolyn-merrick.access.log;
    error_log  /var/log/nginx/carolyn-merrick.error.log warn;
}
