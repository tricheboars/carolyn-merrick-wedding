# nginx site config — one per environment, each on its OWN container.
# HAProxy terminates TLS and routes by Host to the right container:
#   DEV  = merrolyn.moorelab.cloud -> dev web CT  (this file's first block)
#   PROD = merrolyn.com (+ www)    -> prod web CT (this file's second block)
# Each container reverse-proxies /api/* and /sms-webhook to ITS OWN Fastify on :3000.
# (Deployed as /etc/nginx/sites-available/merrolyn on each container.)

# ─── DEV container: /etc/nginx/sites-available/merrolyn ───────────────────────
server {
    listen 80 default_server;
    server_name merrolyn.moorelab.cloud _;
    root /var/www/merrolyn-dev;
    index index.html;
    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Robots-Tag "noindex, nofollow" always;   # keep dev out of search
    location / { try_files $uri $uri/ =404; }
    location ~ ^/(api/|sms-webhook) {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~* \.(css|js|svg|jpg|jpeg|png|woff2?)$ { expires 7d; add_header Cache-Control public; }
}

# ─── PROD container: /etc/nginx/sites-available/merrolyn ──────────────────────
server {
    listen 80 default_server;
    server_name merrolyn.com www.merrolyn.com _;
    root /var/www/merrolyn;
    index index.html;
    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    location / { try_files $uri $uri/ =404; }
    location ~ ^/(api/|sms-webhook) {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~* \.(css|js|svg|jpg|jpeg|png|woff2?)$ { expires 7d; add_header Cache-Control public; }
}
